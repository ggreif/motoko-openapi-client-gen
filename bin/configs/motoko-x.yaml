generatorName: motoko
outputDir: samples/client/x/motoko/generated
inputSpec: samples/client/x/motoko/specs/x-openapi.json
templateDir: modules/openapi-generator/src/main/resources/motoko
artifactId: x-client
artifactVersion: 0.2.2
modelNameMappings:
  # Twitter's `List` schema collides with `mo:core/List` (the codegen imports
  # `mo:core/List` for `Lst__.empty<>` / `add` / `toArray` in record decoders).
  # Rename the schema globally so generated `TwitterList.mo` and
  # `import { type TwitterList; … } "./TwitterList";` lines don't shadow the
  # standard library import.
  List: TwitterList
additionalProperties:
  hideGenerationTimestamp: "true"
  useDfx: false
  diagnostics: true
  artifactRepoUrl: "https://github.com/caffeinelabs/x-client"
