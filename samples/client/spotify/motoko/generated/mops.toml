[toolchain]
moc = "1.3.0"

[package]
name = "spotify-client"
version = "0.1.0"
description = "Generated Motoko client for Spotify Web API"
repository = "https://github.com/ggreif/openapi-generator/tree/master/samples/client/spotify/motoko/generated"
keywords = ["spotify", "openapi", "http", "client", "generated"]
license = "Apache-2.0"
files = ["Apis/**/*.mo", "Models/**/*.mo"]

[dependencies]
core = "https://github.com/caffeinelabs/motoko-core#refs/pull/468/head@02489fda0f3752239ea8e24047646d15e4c3892a"
# NOTE: github.com/ggreif/* are temporary forks used during motoko-core transition.
# Replace with official published versions when upstreamed:
#   serde = "3.4.0" (or latest from github.com/NatLabs/serde)
#   byte-utils = "0.1.2" (or latest official version)
serde = "https://github.com/ggreif/serde#core@8e4a4fb171cb83beac1c8058b4c1b7f7ec103281"
"cbor@4.1.0" = "4.1.0"
xtended-numbers = "2.3.0"
"itertools@0.2.2" = "0.2.2" # because for ByteUtils
byte-utils = "https://github.com/ggreif/ByteUtils#core@d6f295682dec0e1409368d570ffbbe729eddce2d" # NatLabs/ByteUtils refs/pull/3/head
base = "0.14.13" # because serde uses json.mo submodule
"xtended-numbers@2.3.0" = "2.3.0" # because for ByteUtils
"sha2@0.1.6" = "0.1.6"
