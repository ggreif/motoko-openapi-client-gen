openapi: 3.0.0
info:
  title: HTTPBin Auth Test API
  version: 1.0.0
  description: Test API for authentication (bearer tokens, API keys) using httpbin.org endpoints
servers:
  - url: https://httpbin.org
paths:
  /bearer:
    get:
      operationId: testBearer
      summary: Test bearer token authentication
      description: Validates that the bearer token is correctly sent in the Authorization header
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                    description: Whether the request was authenticated
                  token:
                    type: string
                    description: The bearer token that was received
        '401':
          description: Unauthorized - no token or invalid token
  /headers:
    get:
      operationId: getHeaders
      summary: Get all request headers
      description: Returns all headers sent in the request, useful for verifying Authorization header format
      responses:
        '200':
          description: Headers returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  headers:
                    type: object
                    description: Map of all request headers
                    additionalProperties:
                      type: string
  /response-headers:
    get:
      operationId: testApiKeyHeader
      summary: Test API key in header
      description: Validates that the API key is correctly sent in the X-API-Key header
      security:
        - apiKeyHeader: []
      parameters:
        - name: X-API-Key
          in: query
          required: false
          schema:
            type: string
          description: Echo back the API key in response headers (for verification)
      responses:
        '200':
          description: Request processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Content-Type:
                    type: string
                  X-API-Key:
                    type: string
                    description: The API key that was received in the header
        '401':
          description: Unauthorized - no API key provided
  /get:
    get:
      operationId: testApiKeyQuery
      summary: Test API key in query parameter
      description: Validates that the API key is correctly sent as a query parameter
      security:
        - apiKeyQuery: []
      responses:
        '200':
          description: Request processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  args:
                    type: object
                    description: Query parameters sent in the request
                    additionalProperties:
                      type: string
                  url:
                    type: string
                    description: The full URL that was requested
        '401':
          description: Unauthorized - no API key provided
  /basic-auth/{user}/{pass}:
    get:
      operationId: testBasicAuth
      summary: Test Basic Authentication
      description: Validates that Basic Auth credentials are correctly sent in the Authorization header
      security:
        - basicAuth: []
      parameters:
        - name: user
          in: path
          required: true
          schema:
            type: string
          description: Username for authentication
        - name: pass
          in: path
          required: true
          schema:
            type: string
          description: Password for authentication
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                    description: Whether the request was authenticated
                  user:
                    type: string
                    description: The username that was authenticated
        '401':
          description: Unauthorized - invalid credentials
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication (OAuth 2.0 style)
    apiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key in custom header
    apiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key as query parameter
    basicAuth:
      type: http
      scheme: basic
      description: Basic HTTP authentication (username and password)
